<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="user-info-modal">
      <div class="modal-content">
        <h2 class="modal-header">Enter your details</h2>

        <form class="user-info-form">
          <input name="username" type="text" required placeholder="Your display name" />

          <select name="role" class="chat-select" required>
            <option value="student">Student</option>
            <option value="mentor">Mentor</option>
            <option value="psychiatrist">Psychiatrist</option>
          </select>

          <input
            id="targetStudent"
            name="targetStudent"
            type="text"
            placeholder="Target student (only for mentor/psychiatrist)"
          />

          <button type="submit" class="button join-button">Join</button>
        </form>
      </div>
    </div>

    <div class="chat-container">
      <h2 class="chat-header">Who's chatting...</h2>

      <div class="chat-messages"></div>

      <form class="chat-input-form">
        <input type="text" class="chat-input" required placeholder="Type your message..." />
        <button type="submit" class="button send-button">Send</button>
      </form>
      <button class="button clear-chat-button">Clear Chat</button>
    </div>

    <script src="code.js"></script>
  </body>
</html>
