<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tuliza - Complete Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar" aria-label="Main navigation">
    <a class="logo" href="account.html">
      <div class="logo-mark" aria-hidden="true">
        <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 1C4.7 1 2 3.7 2 7c0 2.1 1.1 4 2.7 5.1L8 15l3.3-2.9C12.9 11 14 9.1 14 7c0-3.3-2.7-6-6-6zm0 8c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/>
        </svg>
      </div>
      <span class="logo-text">Tuliz<span class="accent-letter">a</span></span>
    </a>
  </nav>

  <main class="auth-main fade-up">
    <section class="auth-hero-card fade-up">
      <span class="match-eyebrow">Profile setup</span>
      <h1>Complete your profile</h1>
      <p class="subtitle">Finish this step to continue to your next stage.</p>
    </section>

    <section class="auth-card fade-up fade-up-delay-1" style="margin-top:20px;">
      <form id="profile-form">
        <div class="form-group">
          <label class="form-label" for="profile-email">Email</label>
          <input class="form-input" id="profile-email" type="email" readonly />
        </div>

        <div class="form-group" id="username-group" style="display:none;">
          <label class="form-label" for="profile-username">Username</label>
          <input class="form-input" id="profile-username" type="text" maxlength="100" placeholder="Choose your display username" />
        </div>

        <div class="form-group" id="fullname-group" style="display:none;">
          <label class="form-label" for="profile-fullname">Full name</label>
          <input class="form-input" id="profile-fullname" type="text" maxlength="120" placeholder="Enter your full name" />
        </div>

        <p id="profile-message" class="role-help-text" aria-live="polite"></p>
        <button class="btn-primary" type="submit">Save profile</button>
      </form>
    </section>
  </main>

  <script>
    const profileForm = document.getElementById('profile-form');
    const profileMessage = document.getElementById('profile-message');
    const emailInput = document.getElementById('profile-email');
    const usernameGroup = document.getElementById('username-group');
    const fullNameGroup = document.getElementById('fullname-group');
    const usernameInput = document.getElementById('profile-username');
    const fullNameInput = document.getElementById('profile-fullname');

    let sessionUser = null;
    try {
      sessionUser = JSON.parse(sessionStorage.getItem('tuliza_session_user') || '{}');
    } catch (_) {
      sessionUser = null;
    }

    if (!sessionUser || !sessionUser.signupId || !sessionUser.role) {
      window.location.href = 'account.html';
    }

    const role = String(sessionUser.role || '').toLowerCase();
    emailInput.value = String(sessionUser.email || '');

    if (role === 'student') {
      usernameGroup.style.display = '';
      usernameInput.required = true;
    } else if (role === 'mentor' || role === 'psychiatrist') {
      fullNameGroup.style.display = '';
      fullNameInput.required = true;
    } else {
      window.location.href = 'account.html';
    }

    profileForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      profileMessage.textContent = '';

      const payload = {
        signupId: sessionUser.signupId,
        role,
        username: usernameInput.value.trim(),
        fullName: fullNameInput.value.trim(),
      };

      try {
        const response = await fetch('/api/profile', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          profileMessage.textContent = data.error || 'Failed to save profile.';
          return;
        }

        sessionStorage.setItem('tuliza_session_user', JSON.stringify({
          ...sessionUser,
          role: data.role || role,
          userId: data.userId || sessionUser.userId,
          signupId: data.signupId || sessionUser.signupId,
        }));

        profileMessage.textContent = 'Profile saved. Redirecting...';
        window.location.href = data.redirectTo || 'account.html';
      } catch (_) {
        profileMessage.textContent = 'Could not reach server.';
      }
    });
  </script>
</body>
</html>
