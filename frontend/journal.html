<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tuliza - Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar" aria-label="Main navigation">
    <a class="logo" href="/student.html">
      <div class="logo-mark" aria-hidden="true">
        <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 1C4.7 1 2 3.7 2 7c0 2.1 1.1 4 2.7 5.1L8 15l3.3-2.9C12.9 11 14 9.1 14 7c0-3.3-2.7-6-6-6zm0 8c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/>
        </svg>
      </div>
      <span class="logo-text">Tuliz<span class="accent-letter">a</span></span>
    </a>
    <div class="nav-tabs" role="navigation" aria-label="Section links">
      <a class="nav-tab" href="/student.html">Dashboard</a>
      <a class="nav-tab" href="/chat-ui.html">Chat</a>
      <a class="nav-tab" href="/resources.html">Resources</a>
      <a class="nav-tab active" href="/journal.html" aria-current="page">Journal</a>
      <a class="nav-tab" href="/account.html">Account</a>
    </div>
  </nav>

  <main class="journal-main">
    <h1>Private Journal</h1>
    <p class="subtitle">Write freely. This space is for reflection and emotional clarity.</p>

    <section class="editor" aria-label="Journal editor">
      <div class="toolbar">
        <strong>New entry</strong>
        <span class="date" id="date-label"></span>
      </div>
      <div class="journal-meta-row">
        <input id="journal-title" class="form-input" type="text" maxlength="255" placeholder="Entry title (optional)" />
        <select id="journal-mood" class="form-select" aria-label="Select mood for this entry">
          <option value="">Mood (optional)</option>
          <option value="great">Great</option>
          <option value="calm">Calm</option>
          <option value="low">Low</option>
          <option value="anxious">Anxious</option>
          <option value="stressed">Stressed</option>
          <option value="numb">Numb</option>
        </select>
      </div>
      <textarea id="journal-input" placeholder="Today I am feeling..."></textarea>
      <div class="footer">
        <span class="count" id="word-count">0 words</span>
        <button class="save-btn" type="button">Save entry</button>
      </div>
      <p id="journal-feedback" class="journal-feedback" aria-live="polite"></p>
    </section>

    <section class="journal-history" aria-label="Previous journal entries">
      <div class="toolbar">
        <strong>Previous entries</strong>
      </div>
      <div id="journal-history-list" class="journal-history-list">
        <p class="journal-history-empty">Loading your journal history...</p>
      </div>
    </section>
  </main>

  <script>
    const dateLabel = document.getElementById('date-label');
    const journalInput = document.getElementById('journal-input');
    const wordCount = document.getElementById('word-count');
    const saveButton = document.querySelector('.save-btn');
    const journalFeedback = document.getElementById('journal-feedback');
    const journalTitle = document.getElementById('journal-title');
    const journalMood = document.getElementById('journal-mood');
    const historyList = document.getElementById('journal-history-list');

    let resolvedStudentId = null;

    function updateDateLabel() {
      const now = new Date();
      dateLabel.textContent = now.toLocaleDateString(undefined, {
        weekday: 'long',
        month: 'long',
        day: 'numeric',
        year: 'numeric',
      });
    }

    function updateWordCount() {
      const text = String(journalInput.value || '').trim();
      const words = text ? text.split(/\s+/).length : 0;
      wordCount.textContent = `${words} ${words === 1 ? 'word' : 'words'}`;
    }

    function formatWhen(iso) {
      const date = new Date(iso);
      if (Number.isNaN(date.getTime())) return '-';
      return date.toLocaleString(undefined, {
        month: 'short',
        day: 'numeric',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
      });
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    async function resolveStudentId() {
      let sessionUser = null;
      try {
        sessionUser = JSON.parse(sessionStorage.getItem('tuliza_session_user') || '{}');
      } catch (_) {
        sessionUser = null;
      }

      if (!sessionUser || String(sessionUser.role || '').toLowerCase() !== 'student') {
        window.location.href = '/account.html';
        return null;
      }

      const numericSessionUserId = Number(sessionUser.userId);
      if (Number.isInteger(numericSessionUserId) && numericSessionUserId > 0) {
        return numericSessionUserId;
      }

      const numericSignupId = Number(sessionUser.signupId);
      if (Number.isInteger(numericSignupId) && numericSignupId > 0) {
        return numericSignupId;
      }

      if (sessionUser.email) {
        try {
          const response = await fetch(`/api/users/resolve-id?role=student&identifier=${encodeURIComponent(String(sessionUser.email))}`);
          const payload = await response.json().catch(() => ({}));
          if (response.ok && payload.userId) {
            return Number(payload.userId);
          }
        } catch (_) {
          return null;
        }
      }

      return null;
    }

    function renderHistory(entries) {
      if (!historyList) return;

      if (!entries.length) {
        historyList.innerHTML = '<p class="journal-history-empty">No journal entries yet. Write your first one above.</p>';
        return;
      }

      historyList.innerHTML = entries.map((entry) => {
        const moodText = entry.mood ? `<span class="journal-entry-mood">${escapeHtml(entry.mood)}</span>` : '';
        const title = escapeHtml(entry.title || 'Untitled entry');
        const body = escapeHtml(entry.journalEntry || '').replace(/\n/g, '<br>');

        return `
          <article class="journal-entry-card">
            <div class="journal-entry-head">
              <h3>${title}</h3>
              <time>${formatWhen(entry.createdAt)}</time>
            </div>
            ${moodText}
            <p>${body}</p>
          </article>
        `;
      }).join('');
    }

    async function loadHistory() {
      if (!resolvedStudentId) return;
      try {
        const response = await fetch(`/api/journal?studentId=${encodeURIComponent(String(resolvedStudentId))}`);
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          historyList.innerHTML = `<p class="journal-history-empty">${escapeHtml(payload.error || 'Failed to load previous entries.')}</p>`;
          return;
        }

        renderHistory(Array.isArray(payload.entries) ? payload.entries : []);
      } catch (_) {
        historyList.innerHTML = '<p class="journal-history-empty">Could not reach server.</p>';
      }
    }

    async function saveEntry() {
      const journalEntry = String(journalInput.value || '').trim();
      const title = String(journalTitle.value || '').trim();
      const mood = String(journalMood.value || '').trim();

      if (!journalEntry) {
        journalFeedback.textContent = 'Please write something before saving.';
        return;
      }
      if (!resolvedStudentId) {
        journalFeedback.textContent = 'Could not resolve your student profile. Please log in again.';
        return;
      }

      saveButton.disabled = true;
      journalFeedback.textContent = 'Saving entry...';

      try {
        const response = await fetch('/api/journal', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ studentId: resolvedStudentId, title, mood, journalEntry }),
        });

        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          journalFeedback.textContent = payload.error || 'Failed to save entry.';
          return;
        }

        journalInput.value = '';
        journalTitle.value = '';
        journalMood.value = '';
        updateWordCount();
        journalFeedback.textContent = 'Journal entry saved.';
        await loadHistory();
      } catch (_) {
        journalFeedback.textContent = 'Could not reach server.';
      } finally {
        saveButton.disabled = false;
      }
    }

    journalInput.addEventListener('input', updateWordCount);
    saveButton.addEventListener('click', saveEntry);

    (async () => {
      updateDateLabel();
      updateWordCount();
      resolvedStudentId = await resolveStudentId();
      if (!resolvedStudentId) {
        journalFeedback.textContent = 'Login as a student to access journal entries.';
        historyList.innerHTML = '<p class="journal-history-empty">Login as a student to view previous entries.</p>';
        return;
      }
      await loadHistory();
    })();
  </script>

</body>
</html>
