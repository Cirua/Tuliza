<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tuliza - Student Questionnaire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar" aria-label="Main navigation">
    <a class="logo" href="tuliza-frontend.html">
      <div class="logo-mark" aria-hidden="true">
        <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 1C4.7 1 2 3.7 2 7c0 2.1 1.1 4 2.7 5.1L8 15l3.3-2.9C12.9 11 14 9.1 14 7c0-3.3-2.7-6-6-6zm0 8c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/>
        </svg>
      </div>
      <span class="logo-text">Tuliz<span class="accent-letter">a</span></span>
    </a>

    <div class="nav-tabs" role="navigation" aria-label="Section links">
      <a class="nav-tab" href="tuliza-frontend.html">Dashboard</a>
      <a class="nav-tab" href="chat-ui.html">Chat</a>
      <a class="nav-tab" href="resources.html">Resources</a>
      <a class="nav-tab" href="journal.html">Journal</a>
      <a class="nav-tab" href="account.html">Account</a>
    </div>
  </nav>

  <main class="auth-main fade-up">
    <section class="auth-hero-card fade-up">
      <span class="match-eyebrow">Student onboarding</span>
      <h1>Student matching questionnaire</h1>
      <p class="subtitle">Answer these questions so Tuliza can suggest the best mentor or psychiatrist for you.</p>
      <p id="role-guard-message" class="role-help-text" style="display:none;"></p>
    </section>

    <section id="student-questionnaire" class="auth-card fade-up fade-up-delay-1" style="margin-top:20px;">
      <form id="prefs-form">
        <div id="slide-progress" class="slide-progress">Question 1 of 14</div>
        <div class="slide-progress-wrap" aria-hidden="true">
          <div id="slide-progress-bar" class="slide-progress-bar" style="width:7.14%;"></div>
        </div>

        <div class="slide-container">
          <div class="question-slide active" data-slide="1">
            <label class="form-label" for="q-gender">Gender</label>
            <select id="q-gender" class="form-select" required>
              <option value="">Select one</option>
              <option value="Female">Female</option>
              <option value="Male">Male</option>
              <option value="Non-binary">Non-binary</option>
              <option value="Prefer not to say">Prefer not to say</option>
            </select>
          </div>

          <div class="question-slide" data-slide="2" style="display:none;">
            <label class="form-label" for="q-age">Age</label>
            <input id="q-age" class="form-input" type="number" min="16" max="99" required />
          </div>

          <div class="question-slide" data-slide="3" style="display:none;">
            <label class="form-label" for="q-status">Relationship status</label>
            <select id="q-status" class="form-select" required>
              <option value="">Select one</option>
              <option value="Single">Single</option>
              <option value="In a relationship">In a relationship</option>
              <option value="Married">Married</option>
              <option value="Complicated">Complicated</option>
              <option value="Prefer not to say">Prefer not to say</option>
            </select>
          </div>

          <div class="question-slide" data-slide="4" style="display:none;">
            <label class="form-label" for="q-religion-importance">How important is religion in your life?</label>
            <select id="q-religion-importance" class="form-select" required>
              <option value="">Select one</option>
              <option value="not">Not important</option>
              <option value="somewhat">Somewhat important</option>
              <option value="important">Important</option>
              <option value="very">Very important</option>
            </select>
          </div>

          <div class="question-slide" data-slide="5" style="display:none;">
            <label class="form-label" for="q-religion">Religion</label>
            <input id="q-religion" class="form-input" type="text" required />
          </div>

          <div class="question-slide" data-slide="6" style="display:none;">
            <label class="form-label" for="q-christian-match">Do you prefer Christian-based therapy?</label>
            <select id="q-christian-match" class="form-select" required>
              <option value="">Select one</option>
              <option value="yes">Yes</option>
              <option value="no">No</option>
              <option value="open">Open to either</option>
            </select>
          </div>

          <div class="question-slide" data-slide="7" style="display:none;">
            <label class="form-label" for="q-spiritual">Do you consider yourself spiritual?</label>
            <select id="q-spiritual" class="form-select" required>
              <option value="">Select one</option>
              <option value="yes">Yes</option>
              <option value="no">No</option>
              <option value="somewhat">Somewhat</option>
            </select>
          </div>

          <div class="question-slide" data-slide="8" style="display:none;">
            <label class="form-label" for="q-therapy-before">Have you been in therapy before?</label>
            <select id="q-therapy-before" class="form-select" required>
              <option value="">Select one</option>
              <option value="yes">Yes</option>
              <option value="no">No</option>
            </select>
          </div>

          <div class="question-slide" data-slide="9" style="display:none;">
            <label class="form-label" for="q-why-now">What led you to seek support now?</label>
            <textarea id="q-why-now" class="form-textarea" required></textarea>
          </div>

          <div class="question-slide" data-slide="10" style="display:none;">
            <label class="form-label" for="q-expectations">What are your expectations from support?</label>
            <textarea id="q-expectations" class="form-textarea" required></textarea>
          </div>

          <div class="question-slide" data-slide="11" style="display:none;">
            <label class="form-label" for="q-tone">Preferred therapist tone</label>
            <select id="q-tone" class="form-select" required>
              <option value="">Select one</option>
              <option value="gentle">Gentle</option>
              <option value="direct">Direct</option>
              <option value="balanced">Balanced</option>
            </select>
          </div>

          <div class="question-slide" data-slide="12" style="display:none;">
            <label class="form-label" for="q-structure">Preferred session structure</label>
            <select id="q-structure" class="form-select" required>
              <option value="">Select one</option>
              <option value="flexible">Flexible</option>
              <option value="structured">Structured</option>
              <option value="balanced">Balanced</option>
            </select>
          </div>

          <div class="question-slide" data-slide="13" style="display:none;">
            <label class="form-label" for="q-style">Preferred communication style</label>
            <select id="q-style" class="form-select" required>
              <option value="">Select one</option>
              <option value="casual">Casual</option>
              <option value="formal">Formal</option>
              <option value="balanced">Balanced</option>
            </select>
          </div>

          <div class="question-slide" data-slide="14" style="display:none;">
            <label class="form-label" for="q-role">Preferred professional</label>
            <select id="q-role" class="form-select" required>
              <option value="">Select one</option>
              <option value="Mentor">Mentor</option>
              <option value="Psychologist">Psychologist</option>
              <option value="Either">Either</option>
            </select>
          </div>
        </div>

        <div class="slide-nav">
          <button id="prev-slide" type="button" class="btn-ghost-modal">Previous</button>
          <button id="next-slide" type="button" class="btn-primary">Next</button>
          <button id="submit-slides" class="btn-primary" type="submit" style="display:none;">Submit questionnaire</button>
        </div>
      </form>

      <div id="student-result" class="result-card" style="display:none;"></div>
    </section>
  </main>

  <script>
    function getProfessionals() {
      return [
        { id: 'P-101', name: 'Dr. Aisha Kamau', role: 'Psychologist', tone: 'gentle', structure: 'structured', style: 'formal', christianBased: true, spiritualFriendly: true },
        { id: 'P-122', name: 'Mr. Brian Otieno', role: 'Psychologist', tone: 'direct', structure: 'structured', style: 'formal', christianBased: false, spiritualFriendly: true },
        { id: 'M-031', name: 'Lynn Wanjiru', role: 'Mentor', tone: 'gentle', structure: 'flexible', style: 'casual', christianBased: true, spiritualFriendly: true },
        { id: 'M-048', name: 'Kevin Muriuki', role: 'Mentor', tone: 'direct', structure: 'flexible', style: 'casual', christianBased: false, spiritualFriendly: false }
      ];
    }

    function compatibilityScore(user, professional) {
      let score = 35;
      if (user.roleChoice === 'Either' || professional.role === user.roleChoice) score += 20;
      if (user.tone === 'balanced' || professional.tone === user.tone) score += 15;
      if (user.structure === 'balanced' || professional.structure === user.structure) score += 15;
      if (user.style === 'balanced' || professional.style === user.style) score += 15;
      if (user.christianMatch === 'open') score += 5;
      if (user.christianMatch === 'yes' && professional.christianBased) score += 10;
      if (user.christianMatch === 'no' && !professional.christianBased) score += 8;
      if (user.spiritual !== 'no' && professional.spiritualFriendly) score += 5;
      return Math.min(99, score);
    }

    const roleGuardMessage = document.getElementById('role-guard-message');
    const signedUp = JSON.parse(localStorage.getItem('tuliza_signup_user') || '{}');
    if (!signedUp || signedUp.role !== 'student') {
      roleGuardMessage.style.display = 'block';
      roleGuardMessage.textContent = 'This questionnaire is for student signups. Redirecting to account page...';
      setTimeout(() => {
        window.location.href = 'account.html';
      }, 1200);
    }

    const slides = Array.from(document.querySelectorAll('.question-slide'));
    const progress = document.getElementById('slide-progress');
    const progressBar = document.getElementById('slide-progress-bar');
    const prevBtn = document.getElementById('prev-slide');
    const nextBtn = document.getElementById('next-slide');
    const submitBtn = document.getElementById('submit-slides');
    const prefsForm = document.getElementById('prefs-form');
    const studentResult = document.getElementById('student-result');
    let currentSlide = 0;

    function validateCurrentSlide() {
      const fields = slides[currentSlide].querySelectorAll('input[required], select[required], textarea[required]');
      for (const field of fields) {
        if (!field.value || !field.checkValidity()) {
          field.reportValidity();
          return false;
        }
      }
      return true;
    }

    function updateSlides() {
      slides.forEach((slide, idx) => {
        slide.style.display = idx === currentSlide ? '' : 'none';
      });
      progress.textContent = `Question ${currentSlide + 1} of ${slides.length}`;
      progressBar.style.width = `${((currentSlide + 1) / slides.length) * 100}%`;
      prevBtn.disabled = currentSlide === 0;
      nextBtn.style.display = currentSlide === slides.length - 1 ? 'none' : 'inline-flex';
      submitBtn.style.display = currentSlide === slides.length - 1 ? 'inline-flex' : 'none';
    }

    prevBtn.addEventListener('click', () => {
      if (currentSlide > 0) {
        currentSlide -= 1;
        updateSlides();
      }
    });

    nextBtn.addEventListener('click', () => {
      if (!validateCurrentSlide()) return;
      if (currentSlide < slides.length - 1) {
        currentSlide += 1;
        updateSlides();
      }
    });

    prefsForm.addEventListener('submit', (e) => {
      e.preventDefault();
      if (!validateCurrentSlide()) return;

      const user = {
        gender: document.getElementById('q-gender').value,
        age: Number(document.getElementById('q-age').value),
        status: document.getElementById('q-status').value,
        religionImportance: document.getElementById('q-religion-importance').value,
        religion: document.getElementById('q-religion').value.trim(),
        christianMatch: document.getElementById('q-christian-match').value,
        spiritual: document.getElementById('q-spiritual').value,
        therapyBefore: document.getElementById('q-therapy-before').value,
        whyNow: document.getElementById('q-why-now').value.trim(),
        expectations: document.getElementById('q-expectations').value.trim(),
        tone: document.getElementById('q-tone').value,
        structure: document.getElementById('q-structure').value,
        style: document.getElementById('q-style').value,
        roleChoice: document.getElementById('q-role').value
      };

      const ranked = getProfessionals()
        .filter((p) => user.roleChoice === 'Either' || p.role === user.roleChoice)
        .map((p) => ({ ...p, score: compatibilityScore(user, p) }))
        .sort((a, b) => b.score - a.score);

      const top = ranked[0];
      const backup = ranked[1] || null;

      localStorage.setItem('tuliza_student_preferences', JSON.stringify({
        ...user,
        topMatch: top,
        backupMatch: backup,
        createdAt: new Date().toISOString(),
      }));

      studentResult.style.display = 'block';
      studentResult.innerHTML = '<h3 style="margin-bottom:8px;color:var(--plum)">Recommended assignment</h3>'
        + '<strong>Primary:</strong> ' + top.role + ' - ' + top.name + ' (' + top.score + '%)<br>'
        + (backup ? '<strong>Alternative:</strong> ' + backup.name + ' (' + backup.score + '%)<br>' : '')
        + '<br><em>Saved successfully. Redirecting to dashboard...</em>';

      setTimeout(() => {
        window.location.href = 'tuliza-frontend.html';
      }, 1400);
    });

    updateSlides();
  </script>
</body>
</html>
