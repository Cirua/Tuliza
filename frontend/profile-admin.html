<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Tuliza - Admin Profile</title><link rel="stylesheet" href="styles.css" /></head>
<body>
  <main class="auth-main fade-up"><section class="auth-hero-card"><span class="match-eyebrow">Admin profile</span><h1>Complete your admin profile</h1></section>
    <section class="auth-card" style="margin-top:20px;"><form id="profile-form">
      <div class="form-group"><label class="form-label" for="contactId">Contact ID</label><input id="contactId" class="form-input" type="number" /></div>
      <div class="form-group"><label class="form-label" for="resourceId">Resource ID</label><input id="resourceId" class="form-input" type="number" /></div>
      <p id="msg" class="role-help-text"></p><button class="btn-primary" type="submit">Save profile</button>
    </form></section></main>
  <script>
    const form = document.getElementById('profile-form');
    const msg = document.getElementById('msg');
    const sessionUser = JSON.parse(sessionStorage.getItem('tuliza_session_user') || '{}');
    if (!sessionUser || sessionUser.role !== 'admin' || !sessionUser.signupId) window.location.href = 'account.html';
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = { role: 'admin', signupId: sessionUser.signupId, contactId: document.getElementById('contactId').value.trim(), resourceId: document.getElementById('resourceId').value.trim() };
      const res = await fetch('/api/profile', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) { msg.textContent = data.error || 'Failed to save profile'; return; }
      sessionStorage.setItem('tuliza_session_user', JSON.stringify({ ...sessionUser, userId: data.userId, role: data.role, signupId: data.signupId }));
      window.location.href = data.redirectTo || 'admin.html';
    });
  </script>
</body>
</html>
